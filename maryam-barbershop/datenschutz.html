var LANG = "tr";
function $(s){ return document.querySelector(s); }
function $$(s){ return document.querySelectorAll(s); }

function renderContent(){
  var t = I18N[LANG];
  var html = "";
  t.sections.forEach(function(s){
    var num = s[0], title = s[1];
    html += '<section class="sec"><h2><span class="n">'+num+'</span> '+title+'</h2>';
    for(var i=3;i<s.length;i++){
      var block = s[i];
      if(block === "TABLE"){
        html += '<table class="rights"><thead><tr><th>'+t.rightsHead[0]+'</th><th>'+t.rightsHead[1]+'</th></tr></thead><tbody>';
        t.rightsRows.forEach(function(r){ html += '<tr><td><strong>'+r[0]+'</strong></td><td>'+r[1]+'</td></tr>'; });
        html += '</tbody></table>';
      } else if(block.indexOf("LIST:") === 0){
        var items = block.slice(5).split("|");
        html += '<ul>'; items.forEach(function(it){ html += '<li>'+it+'</li>'; }); html += '</ul>';
      } else {
        html += '<p>'+block+'</p>';
      }
    }
    html += '</section>';
  });
  $("#content").innerHTML = html;
}

function applyLang(){
  var t = I18N[LANG];
  $$("[data-i18n]").forEach(function(el){ var k=el.getAttribute("data-i18n"); if(t[k]!=null) el.innerHTML=t[k]; });
  document.documentElement.lang = LANG;
  document.title = "MARYAM · " + t.title.replace(/<[^>]+>/g,"");
  $("#langTxt").textContent = t._name;
  $$("#langMenu button").forEach(function(b){ b.classList.toggle("active", b.dataset.lang===LANG); });
  renderContent();
}

function setLang(l){ if(!I18N[l]) l="tr"; LANG=l; try{ localStorage.setItem("maryam_lang",l); }catch(e){} applyLang(); }
$("#langBtn").addEventListener("click", function(e){ e.stopPropagation(); $("#lang").classList.toggle("open"); $("#langBtn").setAttribute("aria-expanded", $("#lang").classList.contains("open")); });
$$("#langMenu button").forEach(function(b){ b.addEventListener("click", function(){ setLang(b.dataset.lang); $("#lang").classList.remove("open"); }); });
document.addEventListener("click", function(){ $("#lang").classList.remove("open"); });

(function init(){
  var saved=null; try{ saved=localStorage.getItem("maryam_lang"); }catch(e){}
  if(!saved){ var n=(navigator.language||"tr").slice(0,2).toLowerCase(); saved=["tr","en","ru","de"].indexOf(n)>-1 ? n : "tr"; }
  LANG=saved; applyLang();
})();
</script>
